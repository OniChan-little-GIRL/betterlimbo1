name: Build APK 1

on:
  workflow_dispatch:
    inputs:
      module:
        description: Android app module to build
        required: true
        default: all
        type: choice
        options:
          - all
          - limbo-android-x86
          - limbo-android-arm
          - limbo-android-ppc
          - limbo-android-sparc
      build_type:
        description: Build variant
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    name: Build ${{ inputs.module }} ${{ inputs.build_type }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Select Gradle tasks
        id: tasks
        shell: bash
        run: |
          case "${{ inputs.build_type }}" in
            debug) variant="Debug" ;;
            release) variant="Release" ;;
            *) echo "Unsupported build type: ${{ inputs.build_type }}" >&2; exit 1 ;;
          esac

          if [ "${{ inputs.module }}" = "all" ]; then
            modules=(limbo-android-x86 limbo-android-arm limbo-android-ppc limbo-android-sparc)
          else
            modules=("${{ inputs.module }}")
          fi

          tasks=()
          for module in "${modules[@]}"; do
            tasks+=(":${module}:assemble${variant}")
          done

          echo "tasks=${tasks[*]}" >> "$GITHUB_OUTPUT"

      - name: Build APK
        run: gradle ${{ steps.tasks.outputs.tasks }} --stacktrace

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.module }}-${{ inputs.build_type }}
          path: |
            limbo-android-*/build/outputs/apk/**/*.apk
          if-no-files-found: error
